<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Soundings Spotify Links</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #040404;
        color: #f5f5f5;
        min-height: 100vh;
        margin: 0;
        padding: 4rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      h1 {
        margin: 0;
        font-size: 2rem;
      }
      .card {
        background: #111;
        border: 1px solid #222;
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }
      .big-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.9rem 1.2rem;
        border-radius: 999px;
        background: linear-gradient(135deg, #1db954, #55d675);
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .links a {
        font-size: 1rem;
        padding: 0.45rem 0.8rem;
        border-radius: 6px;
        border: 1px solid #2d2d2d;
        background: #1b1b1b;
        color: #d1d1d1;
        text-decoration: none;
      }
      .status {
        font-size: 0.9rem;
        color: #9ba0aa;
      }
      footer {
        margin-top: auto;
        font-size: 0.8rem;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Soundings Spotify Links</h1>
      <p class="status">
        Status endpoint:
        <a href="https://earprint-six.vercel.app/api/spotify/status" target="_blank"
          >https://earprint-six.vercel.app/api/spotify/status</a
        >
      </p>
      <div class="links">
        <a class="big-link" href="https://earprint-six.vercel.app/api/auth/login">Log in with Spotify</a>
        <a class="big-link" href="https://earprint-six.vercel.app/api/auth/logout">Log out of Spotify</a>
      </div>
    </div>
    <footer>Use this page to quickly reauthorize the deployed Soundings app.</footer>
  </body>
</html>
